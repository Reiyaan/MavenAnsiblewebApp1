- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:

    - name: Copy WAR file to Tomcat
      copy:
        src: "{{ lookup('env','WORKSPACE') }}/target/MavenAnsibleWebApp1.war"
        dest: "/opt/tomcat/webapps/MavenAnsibleWebApp1.war"

    - name: Restart Tomcat
      systemd:
        name: tomcat
        state: restarted
